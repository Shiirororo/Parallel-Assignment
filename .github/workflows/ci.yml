name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
      mongo:
        image: mongo:7
        ports: ["27017:27017"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o paralisus .

      - name: Warm up Redis
        run: ./cmd/warmup/main

      - name: Start server
        run: ./paralisus &
        env:
          SERVER_PORT: 36789

      - name: Wait for server
        run: sleep 2

      - name: Test getClassInfo (single)
        run: |
          res=$(curl -sf "http://localhost:36789/api/class/getClassInfo?ids=161001")
          echo "$res" | grep -q "remain_slot"

      - name: Test getClassInfo (multiple)
        run: |
          res=$(curl -sf "http://localhost:36789/api/class/getClassInfo?ids=161001,161002")
          echo "$res" | grep -q "161001"
          echo "$res" | grep -q "161002"

      - name: Test missing ids returns 400
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:36789/api/class/getClassInfo")
          [ "$status" = "400" ]
